apiVersion: v1
kind: ConfigMap
metadata:
  name: pgdam-policies
  namespace: pgdam
data:
  mask.rego: |
    package pgdam.masking

    import future.keywords.if

    default mask_field := false

    # Regex for common Credit Card numbers
    cc_regex = `\b(?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14}|3[47][0-9]{13}|3(?:0[0-5]|[68][0-9])[0-9]{11}|6(?:011|5[0-9]{2})[0-9]{12}|(?:2131|1800|35\d{3})\d{11})\b`

    # Rule to mask based on value pattern (PII detection)
    mask_field if {
        regex.match(cc_regex, input.value)
    }

    # Rule to mask based on common sensitive column names
    mask_field if {
        sensitive_columns := {"email", "ssn", "credit_card", "password", "secret"}
        input.column_name != null
        sensitive_columns[input.column_name]
    }

  kill.rego: |
    package pgdam.kill

    import future.keywords.if
    import future.keywords.in

    default should_kill := false

    # ── SQLi detection ────────────────────────────────────────────────────────
    # UNION-based injection
    should_kill if {
        regex.match(`(?i)\bUNION\b.{0,100}\bSELECT\b`, input.sql)
    }

    # Comment-based injection
    should_kill if {
        regex.match(`(?i)(--|\/\*).{0,50}\b(OR|AND)\b.{0,50}(=|LIKE)`, input.sql)
    }

    # Tautology injection (OR 1=1 --)
    should_kill if {
        regex.match(`(?i)\b(OR|AND)\b\s+[\w'"]+=[\w'"]+\s*--`, input.sql)
    }

    # Stacked queries (semicolon followed by DDL)
    should_kill if {
        regex.match(`(?i);\s*(DROP|DELETE|INSERT|UPDATE|CREATE|ALTER|TRUNCATE)\b`, input.sql)
    }

    # Boolean-based blind injection
    should_kill if {
        regex.match(`(?i)\b(OR|AND)\b\s+\d+\s*=\s*\d+`, input.sql)
    }

    # ── Privilege escalation ──────────────────────────────────────────────────
    should_kill if {
        regex.match(`(?i)\bALTER\s+ROLE\b.{0,100}\bSUPERUSER\b`, input.sql)
    }

    should_kill if {
        regex.match(`(?i)\bCREATE\s+ROLE\b.{0,100}\bSUPERUSER\b`, input.sql)
    }

    # ── Dangerous operations (non-DBA users only) ─────────────────────────────
    trusted_users := {"postgres", "admin", "dba"}

    should_kill if {
        regex.match(`(?i)\bDROP\s+(DATABASE|SCHEMA|TABLE)\b`, input.sql)
        not input.user in trusted_users
    }

    # ── Sensitive system table access (non-DBA users only) ────────────────────
    should_kill if {
        regex.match(`(?i)\bpg_shadow\b`, input.sql)
        not input.user in trusted_users
    }

    # ── Trusted sources whitelist ─────────────────────────────────────────────
    # Never kill connections from localhost or Unix socket connections.
    trusted_sources := {"[local]", "127.0.0.1", "::1"}

    should_kill := false if {
        input.src_ip in trusted_sources
    }
